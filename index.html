<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stulchik Архив</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; padding: 15px; color: #1c1e21; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1250px; margin: auto; }
        
        /* Статусы */
        .status-btn { border: none; background: #eee; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .status-0 { background: #f0f0f0; color: #888; } /* Обычный */
        .status-1 { background: #ffebeb; color: #d93025; font-weight: bold; border: 1px solid #fad2cf; } /* Приоритет */
        .status-2 { background: #e6f4ea; color: #1e8e3e; font-weight: bold; border: 1px solid #ceead6; } /* Выполнено */
        
        tr:hover { background-color: #f8fbff !important; }
        .clickable-row { cursor: pointer; }

        /* Модальное окно */
        #modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); }
        .modal-content { background: white; margin: 2% auto; padding: 30px; width: 85%; max-height: 85%; overflow-y: auto; border-radius: 15px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .close { position: absolute; right: 25px; top: 15px; font-size: 35px; cursor: pointer; color: #aaa; }
        .close:hover { color: #000; }
        pre { white-space: pre-wrap; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 17px; line-height: 1.6; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee; margin-top: 20px; }
        
        h2 { margin-top: 0; color: #1a73e8; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0;">📚 Архив Stulchik</h2>
        <small id="db-status">Загрузка базы...</small>
    </div>
    
    <table id="articlesTable" class="display" style="width:100%">
        <thead>
            <tr>
                <th width="120">Статус</th>
                <th>Категория</th>
                <th>Автор</th>
                <th>Название</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="mTitle"></h2>
        <div style="display: flex; gap: 20px; color: #5f6368;">
            <span><strong>Автор:</strong> <span id="mAuthor"></span></span>
            <span><strong>Категория:</strong> <span id="mCat"></span></span>
        </div>
        <hr>
        <pre id="mContent"></pre>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<script>
    let db;
    let dataTable;
    // Названия статусов
    const statusLabels = ["Обычный", "Приоритет", "Выполнено"];
    // URL базы для локального запуска и GitHub Pages
    const DB_URL = (location.hostname === 'va0kean.github.io')
        ? 'https://github.com/va0kean/stulchik-pwa/releases/download/v1.0.0/archive.db'
        : 'archive.db';

    async function init() {
        try {
            const sqlPromise = initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` });
            const dataPromise = fetch(DB_URL).then(res => res.arrayBuffer());
            const [SQL, buf] = await Promise.all([sqlPromise, dataPromise]);
            db = new SQL.Database(new Uint8Array(buf));
            document.getElementById('db-status').innerText = "База подключена";

            renderTable();
        } catch (err) {
            document.getElementById('db-status').innerText = "Ошибка загрузки: " + err;
        }
    }

    function renderTable() {
        const res = db.exec("SELECT category, author, title, id, file_name FROM articles");
        const rows = res[0] ? res[0].values : [];
        const tableBody = document.getElementById('tableBody');
        
        rows.forEach(row => {
            const savedStatus = parseInt(localStorage.getItem('status_' + row[4]) || '0', 10);
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td data-order="${savedStatus}">
                    <button class="status-btn status-${savedStatus}" onclick="cycleStatus(this, '${row[4]}', event)">
                        ${statusLabels[savedStatus]}
                    </button>
                </td>
                <td class="clickable-row">${row[0]}</td>
                <td class="clickable-row">${row[1]}</td>
                <td class="clickable-row">${row[2]}</td>
            `;
            
            tr.querySelectorAll('.clickable-row').forEach(td => {
                td.onclick = () => openArticle(row[3], row[0]);
            });
            
            tableBody.appendChild(tr);
        });

        dataTable = $('#articlesTable').DataTable({
            language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/ru.json' },
            pageLength: 20,
            order: [[0, 'desc']]
        });
    }

    function cycleStatus(btn, fileName, event) {
        event.stopPropagation(); // Чтобы не открывалось модальное окно
        let currentStatus = parseInt(localStorage.getItem('status_' + fileName) || 0);
        let nextStatus = (currentStatus + 1) % 3;
        
        localStorage.setItem('status_' + fileName, nextStatus);
        
        btn.className = `status-btn status-${nextStatus}`;
        btn.innerText = statusLabels[nextStatus];

        const td = btn.closest('td');
        td.setAttribute('data-order', nextStatus);

        const row = dataTable.row($(td).closest('tr'));
        row.invalidate('dom').draw(false);
    }

    function openArticle(id, category) {
        const res = db.exec(`SELECT title, author, content FROM articles WHERE id = ${id}`);
        const data = res[0].values[0];
        
        document.getElementById('mTitle').innerText = data[0];
        document.getElementById('mAuthor').innerText = data[1];
        document.getElementById('mCat').innerText = category;
        document.getElementById('mContent').innerText = data[2];
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() {
        document.getElementById('modal').style.display = "none";
    }

    window.onclick = (event) => {
        if (event.target == document.getElementById('modal')) closeModal();
    }

    init();
</script>
</body>
</html>
