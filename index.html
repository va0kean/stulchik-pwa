<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stulchik Архив</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; padding: 15px; color: #1c1e21; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1250px; margin: auto; }
        
        /* Статусы */
        .status-btn { border: none; background: #eee; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .status-0 { background: #f0f0f0; color: #888; } /* Обычный */
        .status-1 { background: #ffebeb; color: #d93025; font-weight: bold; border: 1px solid #fad2cf; } /* Приоритет */
        .status-2 { background: #e6f4ea; color: #1e8e3e; font-weight: bold; border: 1px solid #ceead6; } /* Выполнено */
        
        tr:hover { background-color: #f8fbff !important; }
        .clickable-row { cursor: pointer; }

        /* Модальное окно */
        #modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); }
        .modal-content { background: white; margin: 2% auto; padding: 30px; width: 85%; max-height: 85%; overflow-y: auto; border-radius: 15px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .close { position: absolute; right: 25px; top: 15px; font-size: 35px; cursor: pointer; color: #aaa; }
        .close:hover { color: #000; }
        pre { white-space: pre-wrap; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 17px; line-height: 1.6; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee; margin-top: 20px; }
        
        h2 { margin-top: 0; color: #1a73e8; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 16px; flex-wrap: wrap;">
        <h2 style="margin:0;">📚 Архив Stulchik</h2>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
            <small id="db-status">Загрузка базы...</small>
            <label style="font-size:12px; cursor:pointer;">
                <input type="file" id="dbFileInput" accept=".db" style="display:none" onchange="onDbFileChange(event)">
                <span style="padding:4px 8px; border-radius:4px; border:1px solid #ccc; background:#fafafa;">
                    Выбрать файл базы (.db)
                </span>
            </label>
        </div>
    </div>
    
    <table id="articlesTable" class="display" style="width:100%">
        <thead>
            <tr>
                <th width="120">Статус</th>
                <th>Категория</th>
                <th>Автор</th>
                <th>Название</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="mTitle"></h2>
        <div style="display: flex; gap: 20px; color: #5f6368;">
            <span><strong>Автор:</strong> <span id="mAuthor"></span></span>
            <span><strong>Категория:</strong> <span id="mCat"></span></span>
        </div>
        <hr>
        <pre id="mContent"></pre>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<script>
    let db;
    let dataTable;
    let SQLGlobal;
    // Названия статусов
    const statusLabels = ["Обычный", "Приоритет", "Выполнено"];

    async function init() {
        const statusEl = document.getElementById('db-status');
        try {
            // Инициализируем sql.js (загружаем WebAssembly)
            statusEl.innerText = "Инициализация движка базы данных...";
            SQLGlobal = await initSqlJs({
                locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
            });

            // Пытаемся автоматически загрузить базу данных из репозитория
            statusEl.innerText = "Загрузка базы из репозитория...";
            try {
                const resp = await fetch('archive.db');
                if (!resp.ok) throw new Error(`HTTP ${resp.status} - ${resp.statusText}`);
                const buf = await resp.arrayBuffer();
                db = new SQLGlobal.Database(new Uint8Aray(buf));
                const dbSize = buf.byteLength / (1024 * 1024);
                statusEl.innerText = `База подключена из репозитория (${dbSize.toFixed(2)} MB).`;
                renderTable();
            } catch (e) {
                console.error("Ошибка автозагрузки базы:", e);
                statusEl.innerText = "Не удалось загрузить базу. Выберите файл .db вручную.";
            }
        } catch (err) {
            console.error("Ошибка инициализации sql.js:", err);
            statusEl.innerText = "Ошибка инициализации sql.js: " + err;
        }
    }

    function renderTable() {
        if (dataTable) {
            dataTable.destroy();
            dataTable = null;
        }
        document.getElementById('tableBody').innerHTML = "";

        const tableBody = document.getElementById('tableBody');
        const stmt = db.prepare("SELECT category, author, title, id, file_name FROM articles");

        while (stmt.step()) {
            const row = stmt.get(); // [category, author, title, id, file_name]
            const savedStatus = parseInt(localStorage.getItem('status_' + row[4]) || '0', 10);

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td data-order="${savedStatus}">
                    <button class="status-btn status-${savedStatus}" onclick="cycleStatus(this, '${row[4]}', event)">
                        ${statusLabels[savedStatus]}
                    </button>
                </td>
                <td class="clickable-row">${row[0]}</td>
                <td class="clickable-row">${row[1]}</td>
                <td class="clickable-row">${row[2]}</td>
            `;

            tr.querySelectorAll('.clickable-row').forEach(td => {
                td.onclick = () => openArticle(row[3], row[0]);
            });

            tableBody.appendChild(tr);
        }
        stmt.free();

        dataTable = $('#articlesTable').DataTable({
            language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/ru.json' },
            pageLength: 20,
            order: [[0, 'desc']]
        });
    }

    function cycleStatus(btn, fileName, event) {
        event.stopPropagation(); // Чтобы не открывалось модальное окно
        let currentStatus = parseInt(localStorage.getItem('status_' + fileName) || 0);
        let nextStatus = (currentStatus + 1) % 3;
        
        localStorage.setItem('status_' + fileName, nextStatus);
        
        btn.className = `status-btn status-${nextStatus}`;
        btn.innerText = statusLabels[nextStatus];

        const td = btn.closest('td');
        td.setAttribute('data-order', nextStatus);

        const row = dataTable.row($(td).closest('tr'));
        row.invalidate('dom').draw(false);
    }

    async function onDbFileChange(event) {
        const file = event.target.files[0];
        if (!file || !SQLGlobal) return;

        const statusEl = document.getElementById('db-status');

        try {
            // Читаем выбранный пользователем файл базы в память
            const buf = await file.arrayBuffer();
            db = new SQLGlobal.Database(new Uint8Array(buf));

            const dbSize = file.size / (1024 / 1024);
            statusEl.innerText = `База подключена: ${file.name} (${dbSize.toFixed(2)} MB)`;
            renderTable();
        } catch (e) {
            statusEl.innerText = "Ошибка загрузки файла базы: " + e;
        }
    }

    function openArticle(id, category) {
        // Используем параметризованный запрос для безопасности и лучшей практики
        const stmt = db.prepare("SELECT title, author, content FROM articles WHERE id = :id");
        const data = stmt.getAsObject({ ':id': id });
        stmt.free();

        if (data) {
            document.getElementById('mTitle').innerText = data.title;
            document.getElementById('mAuthor').innerText = data.author;
            document.getElementById('mCat').innerText = category;
            document.getElementById('mContent').innerText = data.content;
            document.getElementById('modal').style.display = "block";
        }
    }

    function closeModal() {
        document.getElementById('modal').style.display = "none";
    }

    window.onclick = (event) => {
        if (event.target == document.getElementById('modal')) closeModal();
    }

    init();
</script>
</body>
</html>
